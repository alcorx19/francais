 Espagne - e. à Alger, en Algérie</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. a - b. sommes - c. as - d. sont - e. avez</p></div>",11:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 11, Grammaire</h4><p class='text-rose-500 font-bold text-sm mb-2'>L'adjectif interrogatif quel</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. Quelles - b. quelle - c. Quelle - d. Quelles - e. Quels - f. quel</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. âge - b. langues - c. auteurs - d. numéro - e. ville - f. adresse</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. Quel - b. Quels - c. Quelle - d. Quelles - e. Quelle - f. Quelles</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. Quel - b. Quel - c. Quelle - d. Quelles - e. Quels - f. Quelle</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>5.</span> a. parle - b. parlons - c. parlez - d. parlent - e. parle - f. parles</p></div>",12:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 12, Vocabulaire</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. belge - b. camerounais - c. coréen - d. sénégalaise - e. polonais - f. allemande</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> Prénom - Adresse - Pays - Numéro de téléphone - Mail</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> L'Argentine - L'Inde - tchèque - Le Maroc - américain(e) - Le Vietnam</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. date de naissance - b. 81 - c. 99 - d. 64 - e. lieu de naissance - f. 06 76 66 89 99</p></div><div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 12, Phonie-graphie</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>a.</span> 3. Il est né en Inde. - b. 4. Elle est née aux États-Unis. - c. 5. Il habite aux îles Fidji. - d. 2. Elle habite en Espagne. - e. 1. Tu habites en Algérie</p></div>",13:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 13, Compréhension orale</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> Adam Briant</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> belge</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> à Bruxelles</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> En France</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>5.</span> EA311273</p></div><div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 13, Production écrite</h4><p class='text-sm italic text-slate-500'>Exemple de production: Il s'appelle Thomas Puissat. Il est né à Anvers, en Belgique. Il a 36 ans. Il habite à Marseille, en France. Il aime la musique et le cinéma. Il parle français, italien et japonais.</p></div>",14:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 14, Bilan linguistique (Grammaire)</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. japonaise - b. turque - c. suédoise - d. espagnole - e. mexicaine</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. le - b. l' - c. l' - d. les - e. la</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. en - b. aux - c. à - d. au - e. en</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. 4 - b. 2 - c. 5 - d. 3 - e. 1</p></div>",15:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 15, Bilan linguistique (Vocabulaire)</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> Raquel aime l'art, les langues, le cinéma, la musique, et le sport.</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. 42 - b. 59 - c. 31 - d. 68 - e. 51</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. Allemagne - b. États-Unis - c. Argentine - d. Maroc - e. Vietnam</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. soixante-dix-neuf - b. quatre-vingt-deux - c. quatre-vingt-douze - d. soixante-dix - e. quatre-vingts</p></div>",16:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 16, DELF</h4><p class='text-rose-500 font-bold text-sm mb-2'>1. Compréhension de l'oral</p><p class='mb-1'>1. C. - 2. A. - 3. B. - 4. C.</p><p class='text-rose-500 font-bold text-sm mt-3 mb-2'>2. Compréhension des écrits</p><p class='mb-1'>1. A. - 2. A. - 3. C. - 4. B. - 5. B.</p></div>",17:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 17, DELF</h4><p class='text-rose-500 font-bold text-sm mb-2'>3. Production écrite</p><p class='text-sm italic text-slate-500 mb-3'>Exemple: Nom: XXX - Prénom: Atsuko - Adresse: 5 rue Martainville - Ville: Rouen - Téléphone: 06 25 39 07 13 - Âge: 22 ans - Nationalité: japonaise - Langues: japonais, anglais - Aime: la musique, le café - Pays préféré: Italie</p><p class='text-rose-500 font-bold text-sm mb-2'>4. Production orale</p><p class='text-sm text-slate-600'>- Nationalité: Vous êtes française ?<br>- Âge: Vous avez quel âge ?<br>- Téléphone: Quel est votre numéro de téléphone ?<br>- Aimer: Vous aimez le cinéma ?<br>- Habiter: Dans quelle ville vous habitez ?</p></div>",18:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 18, Jeux</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> art - sport - langues - cinéma - musique</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> POLONAISE, FRANÇAISE, VIETNAMIENNE, ITALIENNE, CORÉENNE, INDIENNE, ESPAGNOLE, SENEGALAISE, CHINOISE, TUNISIENNE, ÉGYPTIENNE</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. l'Algérie - b. la Colombie - c. le Brésil - d. l'Allemagne - e. le Cameroun - f. les Pays-Bas</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> Réponses libres</p></div>",19:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 19, Grammaire</h4><p class='text-rose-500 font-bold text-sm mb-2'>Les articles définis et indéfinis</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. un - b. le - c. la - d. les - e. des - f. l' - g. une</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. un - b. les - c. l' - d. le</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> un - le - un - une - L' - la - des - un - une</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. habitent - b. habite - c. habite - d. habitons - e. habitez - f. habites</p></div>",20:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 20, Grammaire</h4><p class='text-rose-500 font-bold text-sm mb-2'>Verbes en -er au présent</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. je - b. j' - c. n' - d. n' - e. ne - f. j'</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. 4 - b. 1 - c. 6 - d. 2 - e. 3 - f. 5</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. aime - b. adorent - c. parle - d. détestes - e. aimons - f. dansez</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. déteste - b. marche - c. adorent - d. habitez - e. danses - f. skions</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>5.</span> a. ne marchons pas - b. n'aime pas - c. ne parle pas - d. n'aiment pas - e. n'habitez pas - f. ne danses pas</p></div>",21:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 21, Vocabulaire</h4><p class='text-rose-500 font-bold text-sm mb-2'>Les lieux, les loisirs</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. natation - b. marche - c. danser</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. appartement - b. mer - plages - c. quartier - d. instrument</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. 3 - b. 6 - c. 7 - d. 4 - e. 5 - f. 1 - g. 2</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. films - b. festival - c. guitare - d. marche - e. université</p></div><div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 21, Phonie-graphie</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> J'habite à Grenoble. Je travaille à l'université. Mon collègue Mathieu joue de la guitare et ma collègue Manon joue du piano. Ils adorent la musique classique...</p></div>",22:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 22, Grammaire</h4><p class='text-rose-500 font-bold text-sm mb-2'>Les adjectifs possessifs</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. Ma - b. Ton - c. Sa - d. Mes - e. Tes - f. Sa</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. ses frères - b. nos enfants - c. leurs amis - d. vos filles - e. leurs fils - f. nos cousins</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. à moi - b. à moi - c. à vous - d. à toi - e. à lui/à elle - f. à vous - g. à eux/à elles - h. à nous</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. ton - b. ma - c. sa - d. son - e. mes - f. leurs</p></div>",23:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 23, Grammaire</h4><p class='text-rose-500 font-bold text-sm mb-2'>Le masculin et le féminin des professions</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> Masculin: infirmier - informaticien - étudiant. Féminin: professeure - actrice - coiffeuse</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> professeure - informaticien - étudiant - coiffeuse - actrice - infirmier</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. infirmier - b. coiffeur - c. informaticienne - d. étudiant - e. actrice</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. étudie - b. travaillons - c. travaillent - d. étudient - e. travaillez - f. étudies</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>5.</span> a. travaille - b. travaillent - c. étudie - d. étudient - e. travaille - f. étudies</p></div>",24:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 24, Vocabulaire</h4><p class='text-rose-500 font-bold text-sm mb-2'>La famille, les professions</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> Monique + Albert => Karim, Isabelle, Richard, Diane (Sarah est fille de Karim/Isabelle, Cécilia de Richard/Diane)</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. oncle - b. grands-parents - c. cousin - d. petite-fille - e. tante</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. grand-père - b. mari - c. nièce - d. petits-enfants - e. petit ami - f. mariage</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. professeure - b. fleuriste - c. coiffeur - d. informaticien - e. étudiante - f. acteur</p></div>",25:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 25, Compréhension écrite</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. petit ami de Fiona - b. professeur - c. n'a pas de frères et sœurs</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. Vrai - b. Vrai - c. Faux</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> La danse et la musique</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> Ils ont un piano</p></div><div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 25, Production orale</h4><p class='text-sm italic text-slate-500'>Jeux de rôle (réponses libres)</p></div>",26:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 26, Bilan linguistique (Grammaire)</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. une - b. les - c. l' - d. un - e. la</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. parle - b. habitons - c. skie - d. aimez - e. adorent</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. son - b. Ma - c. ses - d. leur - e. leurs</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. coiffeuse - b. fleuriste - c. actrice - d. infirmier - e. informaticienne</p></div>",27:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 27, Bilan linguistique (Vocabulaire)</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> quartier - guitare - festival - plage - mer</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> a. 5 - b. 4 - c. 1 - d. 2 - e. 3</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. Vrai - b. Vrai - c. Vrai - d. Faux - e. Vrai</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> a. infirmier - b. petit ami - c. petits-enfants - d. actrice - e. professeure</p></div>",28:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 28, DELF</h4><p class='text-rose-500 font-bold text-sm mb-2'>1. Compréhension de l'oral</p><p class='mb-1'>A: situation n°4 - B: aucune - C: situation n°2 - D: aucune - E: situation n°3 - F: situation n°1.</p><p class='text-rose-500 font-bold text-sm mt-3 mb-2'>2. Compréhension des écrits</p><p class='mb-1'>1. C. - 2. A. - 3. A. - 4. B. - 5. C.</p></div>",29:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 29, DELF</h4><p class='text-rose-500 font-bold text-sm mb-2'>3. Production écrite</p><p class='text-sm italic text-slate-500 mb-3'>Exemple: Bonjour, Je m'appelle Atsuko. Je suis japonaise, j'ai 22 ans. J'étudie les langues à l'université de Rouen. Mes parents habitent au Japon. J'adore la musique française...</p><p class='text-rose-500 font-bold text-sm mb-2'>4. Production orale</p><p class='text-sm text-slate-600'>- Profession: Quelle est votre profession? <br>- Quartier: Votre quartier est calme ? <br>- Adresse: Vous habitez où ?</p></div>",30:"<div class='mb-4'><h4 class='text-sky-600 font-bold text-base border-b border-sky-100 pb-1 mb-2'>Page 30, Jeux</h4><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>1.</span> a. célibataire - b. marié - c. mariage - d. petit ami - e. étudiant - f. enfants</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>2.</span> Mots cachés: INFORMATICIEN, PROFESSEUR etc.</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>3.</span> a. TRAVAILLENT - b. NAGE - c. DANSE - d. ETUDIES - 2. PARLONS - 3. AIMENT - 4. DETESTEZ</p><p class='mb-1'><span class='bg-emerald-100 text-emerald-700 font-bold px-1.5 py-0.5 rounded text-xs mr-1'>4.</span> Réponses libres.</p></div>"},ig={12:{pageNumber:12,bookPageNumber:11,title:"Se présenter en français",unitTitle:"Unité 1: Les Salutations",texts:["Bonjour! Je m'appelle Jean. J'ai vingt-cinq ans et je suis étudiant de langues à Paris. J'adore voyager à travers la France pendant la saison d'été.","La langue française est très belle et mélodieuse. Pour commencer à apprendre, nous devons maîtriser les salutations formelles et informelles pour saluer nos amis et collègues.","Écoutez l'enregistrement audio placé par votre enseignant pour écouter la prononciation exacte du mot 'Enchanté' et de la phrase 'Comment allez-vous?'."],exercises:[{instruction:"Exercice 1: Lisez le texte ci-dessus et associez la question à la bonne réponse.",questions:["1. Comment ça va?  (a / b / c)","2. Comment tu t'appelles?  (a / b / c)","3. Tu es d'où?  (a / b / c)"]},{instruction:"Exercice 2: Choisissez le pronom sujet correct pour compléter la salutation.",questions:["a) Comment ____ vous appelez-vous? (tu / vous / nous)","b) Salut! ____ m'appelle Julie. (je / tu / il)","c) Enchanté, ____ est ravi de vous voir! (on / nous / vous)"]}],interactiveTips:"Cliquez sur n'importe quel mot comme 'voyager' ou 'étudiant' pour le traduire instantanément en turc avec MyMemory!"},24:{pageNumber:24,bookPageNumber:23,title:"Décrire sa ville natale",unitTitle:"Unité 2: La Ville et Ma Maison",texts:["J'habite dans une très jolie ville qui s'appelle Strasbourg. C'est une ville historique située à l'est de la France, juste à côté de la frontière de l'Allemagne.","Au centre de notre communauté, il y a une grande bibliothèque calme, une magnifique cathédrale gothique médiévale, et plusieurs petits cafés traditionnels.","Tous les matins, les gens aiment traverser le pont historique pour acheter des croissants chauds à la boulangerie locale."],exercises:[{instruction:"Exercice 1: Dans ma ville, d'après le texte, où les gens vont-ils pour étudier?",questions:["- Les gens vont à la grand-rue, au cinéma, ou à la bibliothèque?","- Qu'est-ce qu'ils achètent à la boulangerie locale?","- Ma ville est située à quel endroit par rapport à l'Allemagne?"]}],interactiveTips:"Utilisez le pinceau ou le surligneur pour souligner la localisation de la cathédrale!"},36:{pageNumber:36,bookPageNumber:35,title:"Ma Famille et Nos Traditions",unitTitle:"Unité 3: Ma Famille",texts:["Ma famille est assez grande et nous sommes très soudés. Mon père s'appelle Pierre, il est docteur. Ma mère s'appelle Marie, elle est enseignante de musique classique.","J'ai une sœur cadette qui s'appelle Sophie et un frère aîné s'appelant Lucas. Pendant le week-end, nous aimons préparer des dîners spéciaux ensemble.","Ce soir, Lucas apporte une tarte aux pommes préparée par notre grand-mère chaleureuse."],exercises:[{instruction:"Exercice 1: Complétez les phrases avec l'adjectif possessif correct.",questions:["1. C'est ____ père (mon/ma/mes).","2. Voilà ____ mère (son/sa/ses).","3. Ce sont ____ enfants (leur/leurs)."]}],interactiveTips:"Écoutez les pistes audio pour entendre les introductions de chaque membre de la famille."},48:{pageNumber:48,bookPageNumber:47,title:"Commander de la nourriture au bistrot",unitTitle:"Unité 4: Au Restaurant",texts:["Bienvenue au Bistro de Paris! Nous vous proposons les meilleures spécialités françaises dans une ambiance décontractée.","Pour commencer, vous devriez choisir une délicieuse quiche lorraine ou une soupe à l'oignon parisienne accompagnée de pain chaud croustillant.","Notre plat principal traditionnel est le bœuf bourguignon mijoté lentement avec des carottes fraîches et du vin rouge raffiné."],exercises:[{instruction:"Exercice 1: Complétez le dialogue de commande au restaurant.",questions:["- Serveur: Qu'est-ce que vous désirez?","- Client: Je voudrais un ____ et un café au lait, s'il vous plaît.","- Client: Et comme entrée, je prendrai une ____ lorraine."]}],interactiveTips:"Traduisez des mots comestibles comme 'nourriture', 'bœuf' ou 'pain' pour enrichir votre vocabulaire."},60:{pageNumber:60,bookPageNumber:59,title:"Planifier des Vacances de Rêve",unitTitle:"Unité 5: Les Voyages",texts:["Pour beaucoup de voyageurs, un voyage idéal consiste à passer du temps sur les plages ensoleillées de la Côte d'Azur, à faire de la randonnée en haute montagne ou à explorer de magnifiques villages médiévaux.","À Nice, vous pouvez flâner le long de la célèbre Promenade des Anglais, visiter des musées d'art moderne comme le Musée Matisse et goûter la cuisine niçoise riche d'olives, de basilic et de tomates parfumées.","Préparez bien votre valise, réservez des billets de train à l'avance et n'oubliez surtout pas votre passeport!"],exercises:[{instruction:"Exercice 2: Répondez par Vrai ou Faux en fonction du texte instructif.",questions:["- Nice se trouve au nord de la France. (Vrai / Faux)","- Il est recommandé d'avoir un passeport pour voyager. (Vrai / Faux)","- Le Musée Matisse se situe sur la Côte d'Azur. (Vrai / Faux)"]}],interactiveTips:"Surlignez les conseils pratiques pour préparer un voyage réussi."}};function Qy(a){return ig[a]?ig[a]:{pageNumber:a,bookPageNumber:a-1,title:`Leçon Supplément     let currentPage = 12;

    const UNITS = [
      { name: "Unité 1: Les Salutations", page: 12 },
      { name: "Unité 2: La Ville ", page: 24 },
      { name: "Unité 3: Ma Famille", page: 36 },
      { name: "Unité 4: Au Restaurant", page: 48 },
      { name: "Unité 5: Les Voyages", page: 60 }
    ];

    function init() {
      // Load local changes if user draws on the standalone version
      const localLoaded = localStorage.getItem(STORAGE_KEY);
      if (localLoaded) {
        try {
          const parsed = JSON.parse(localLoaded);
          if (parsed.soundMarkers) soundMarkers = parsed.soundMarkers;
          if (parsed.drawingStrokes) drawingStrokes = parsed.drawingStrokes;
          if (parsed.drawingTexts) drawingTexts = parsed.drawingTexts;
        } catch(e) {}
      }

      renderUnits();
      renderPage();
      
      // Close tooltip on document move
      document.addEventListener('click', (e) => {
        const bubble = document.getElementById('tooltip-bubble');
        if (!e.target.closest('.word-span') && !e.target.closest('#tooltip-bubble')) {
          bubble.classList.add('hidden');
        }
      });
    }

    function renderUnits() {
      const container = document.getElementById('units-list');
      container.innerHTML = '';
      UNITS.forEach(u => {
        const btn = document.createElement('button');
        btn.innerHTML = "<span class="truncate">" + u.name + "</span> <span class="text-[9px] bg-slate-805 px-1.5 py-0.5 rounded font-mono">P." + u.page + "</span>";
        btn.className = "w-full text-left p-2.5 rounded-xl text-xs flex items-center justify-between border transition cursor-pointer " +
          (currentPage === u.page ? "bg-blue-900/50 border-blue-800 text-blue-300 font-bold shadow-md" : "bg-slate-950 border-transparent text-slate-400 hover:bg-slate-800");
        btn.onclick = () => {
          currentPage = u.page;
          renderPage();
          renderUnits();
        };
        container.appendChild(btn);
      });
    }

    function changePage(delta) {
      const pages = [12, 24, 36, 48, 60];
      let currentIdx = pages.indexOf(currentPage);
      if (currentIdx === -1) currentIdx = 0;
      let targetIdx = currentIdx + delta;
      if (targetIdx >= 0 && targetIdx < pages.length) {
        currentPage = pages[targetIdx];
        renderPage();
        renderUnits();
      }
    }

    function renderPage() {
      document.getElementById('page-indicator').textContent = 'Sayfa: ' + currentPage;
      const data = PAGES_DATA[currentPage] || {
        unitTitle: "Ek Sayfa",
        title: "İnteraktif Sayfa " + currentPage,
        texts: ["Bu sayfa tamamen portatiftir."],
        exercises: [],
        interactiveTips: ""
      };

      const view = document.getElementById('textbook-view');
      
      // Build internal text with clickable words
      let textsHtml = '';
      data.texts.forEach(para => {
        const words = para.split(" ");
        let wordSpans = words.map(w => {
          const clean = w.trim().replace(/^[^a-zA-Z0-9àâäéèêëîïôöùûüçœŒ-]+|[^a-zA-Z0-9àâäéèêëîïôöùûüçœŒ-]+$/g, "").toLowerCase();
          return "<span class="word-span cursor-help hover:bg-yellow-250 hover:text-slate-950 rounded px-1.5 py-0.5 transition font-medium" onclick="translateWord(event, '" + clean + "', '" + w + "')">" + w + "</span>";
        }).join(" ");
        textsHtml += "<p class="indent-6 text-justify text-slate-750 leading-relaxed font-serif text-[17px] mb-4">" + wordSpans + "</p>";

      let exercisesHtml = '';
      data.exercises.forEach((ex, exIdx) => {

          "<h4 class="font-sans font-bold text-xs text-blue-600 mb-2 uppercase flex items-center space-x-2">" +

          "</div>" +

    }

    function drawCanvas() {
      const canv = document.getElementById('canv-draw');
      const hili = document.getElementById('canv-hili');
      const ctxDraw = canv.getContext('2d');
      const ctxHili = hili.getContext('2d');
      
      ctxDraw.clearRect(0,0, 800, 1100);
      ctxHili.clearRect(0,0, 800, 1100);

      drawingStrokes.forEach(stroke => {
        if (stroke.pageNumber !== currentPage) return;
        const ctx = stroke.tool === 'highlighter' ? ctxHili : ctxDraw;
        ctx.beginPath();
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = stroke.color;
        ctx.lineWidth = stroke.width;
        if (stroke.tool === 'highlighter') {
          ctx.globalAlpha = 0.4;
        } else {
          ctx.globalAlpha = 1.0;
        }
        
        if (stroke.points.length > 0) {
          ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
          for (let i = 1; i<stroke.points.length; i++) {
            ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
          }
          ctx.stroke();
        }
      });
    }

    function renderHtmlOverlays() {
      const overlay = document.getElementById('overlay-layer');
      overlay.innerHTML = '';

      drawingTexts.forEach(t => {
        if (t.pageNumber !== currentPage) return;
        const div = document.createElement('div');
        div.className = "absolute text-xs bg-white/90 border border-slate-200/50 p-1.5 shadow-sm rounded pointer-events-auto font-sans font-semibold";
        div.style.left = t.x + '%';
        div.style.top = t.y + '%';
        div.style.transform = 'translate(-50%, -50%)';
        div.style.color = t.color;
        div.style.fontSize = t.fontSize + 'px';
        div.textContent = t.text;
        overlay.appendChild(div);
      });

      soundMarkers.forEach(m => {
        if (m.pageNumber !== currentPage) return;
        const div = document.createElement('div');
        div.className = "absolute pointer-events-auto";
        div.style.left = m.x + '%';
        div.style.top = m.y + '%';
        div.style.transform = 'translate(-50%, -50%)';
        
        const btn = document.createElement('button');
        btn.className = "w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center hover:bg-blue-500 shadow-md border border-blue-400 hover:scale-105 transition cursor-pointer";
        btn.innerHTML = "<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>";
        btn.onclick = (e) => {
          e.stopPropagation();
          speakFrenchFromMarker(m);
        };
        div.appendChild(btn);
        overlay.appendChild(div);
      });
    }

    function translateWord(e, cleanWord, origWord) {
      e.stopPropagation();
      const bubble = document.getElementById('tooltip-bubble');
      
      const clean = cleanWord.normalize("NFD").replace(/[̀-ͯ]/g, ""); // strip accents
      const TurkishText = LOCAL_DICT[cleanWord] || LOCAL_DICT[clean] || "Bu kelime için çeviri bulunamadı. (Çevrimdışı)";
      
      const rect = e.target.getBoundingClientRect();
      const x = rect.left + window.scrollX;
      const y = rect.top + window.scrollY;

      bubble.style.left = x + 'px';
      bubble.style.top = (y - 120) + 'px';
      
      bubble.innerHTML = "<div class="flex items-center justify-between border-b border-slate-800 pb-1.5 mb-2">" +
          "<span class="font-mono text-[9px] text-slate-400 uppercase tracking-widest font-bold">Lokal Sözlük (Çevrimdışı Sürüm)</span>" +
        "</div>" +
        "<div class="font-serif italic font-bold text-base text-blue-300">" + origWord + "</div>" +
        "<p class="font-sans font-medium text-slate-200 text-[13px] mt-1 capitalize">" + TurkishText + "</p>";
      
      bubble.classList.remove('hidden');
    }

    function speakFrenchFromMarker(m) {
      if (!window.speechSynthesis) {
        alert("Tarayıcınız ses sentezlemeyi desteklemiyor!");
        return;
      }
      window.speechSynthesis.cancel();
      
      const data = PAGES_DATA[m.pageNumber];
      const text = data ? data.texts[0] : "Bonjour !";
      
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'fr-FR';
      utter.rate = 0.95;
      
      const voices = window.speechSynthesis.getVoices();
      const frVoice = voices.find(v => v.lang.includes('fr-'));
      if (frVoice) utter.voice = frVoice;
      
      window.speechSynthesis.speak(utter);
    }
